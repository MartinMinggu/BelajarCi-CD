name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MathService

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/MathService/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Upload hasil build supaya bisa dipakai job test paralel
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: MathService/
          retention-days: 1

  test-math:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/MathService/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run MathService tests
        run: dotnet test tests/MathService.Tests --configuration Release --verbosity normal --filter "FullyQualifiedName~MathServiceTests"

        working-directory: MathService

  test-string:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/MathService/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run StringService tests
        run: dotnet test tests/MathService.Tests
             --configuration Release
             --verbosity normal
             --filter "FullyQualifiedName~StringServiceTests"
        working-directory: MathService

  test-date:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/MathService/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run DateService tests
        run: dotnet test tests/MathService.Tests
             --configuration Release
             --verbosity normal
             --filter "FullyQualifiedName~DateServiceTests"
        working-directory: MathService
  docker:
    runs-on: ubuntu-latest
    needs: [test-math, test-string, test-date]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # TAMBAHKAN BLOK INI:
    permissions:
      contents: read
      packages: write # <--- Ini yang memberi izin untuk mengunggah Docker Image
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dan push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./MathService
          push: true
          tags: ghcr.io/martinminggu/mathservice:latest